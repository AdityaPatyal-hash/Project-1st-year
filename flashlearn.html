<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashLearn – AI Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       FlashLearn – CSS
       Pastel, soft, modern. Beginner-friendly comments throughout.
       ============================================================ */

    /* ---- CSS Variables (easy to customise colours here) ---- */
    :root {
      --peach:   #FFD6C0;
      --mint:    #C3F0D8;
      --sky:     #C3DEFF;
      --lemon:   #FFF3C0;
      --lavender:#E5D4FF;
      --rose:    #FFD6E0;

      --bg:      #FFF9F5;
      --ink:     #2D2A26;
      --ink-mid: #6B6560;
      --white:   #FFFFFF;
      --shadow:  rgba(80, 60, 40, 0.10);

      --radius-card: 20px;
      --radius-btn:  50px;
      --transition:  0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---- Reset & Base ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- Utility ---- */
    .hidden { display: none !important; }

    /* ===========================================================
       HERO SECTION
       =========================================================== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.25rem 4rem;
      overflow: hidden;
    }

    /* Decorative blobs in the background */
    .hero-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--peach);
      top: -120px; left: -140px;
    }
    .blob-2 {
      width: 420px; height: 420px;
      background: var(--mint);
      bottom: -100px; right: -120px;
    }

    /* ---- Site Header ---- */
    .site-header {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      padding: 1.75rem 0 0;
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    /* ---- Hero Content ---- */
    .hero-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      margin-top: 4rem;
      text-align: center;
    }
    .hero-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 1rem;
    }
    .hero-title em {
      font-style: italic;
      color: #B06040;
    }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--ink-mid);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    /* ---- Setup Card ---- */
    .setup-card {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 2rem 2.25rem 2.25rem;
      box-shadow: 0 8px 40px var(--shadow);
      text-align: left;
    }

    /* ---- Form Group ---- */
    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-mid);
      margin-bottom: 0.55rem;
    }

    /* Text input */
    .form-group input[type="text"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 2px solid #EDE9E4;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color var(--transition);
    }
    .form-group input[type="text"]:focus,
    .form-group input[type="password"]:focus { border-color: #B06040; }
    .form-group input[type="text"]::placeholder,
    .form-group input[type="password"]::placeholder { color: #C2BAB3; }

    /* Range slider */
    .form-group input[type="range"] {
      width: 100%;
      accent-color: #B06040;
      cursor: pointer;
      margin-top: 0.4rem;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--ink-mid);
      margin-top: 0.3rem;
    }

    /* Count badge */
    .count-badge {
      display: inline-block;
      background: var(--peach);
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.1rem 0.55rem;
      border-radius: 50px;
      margin-left: 0.4rem;
    }

    /* ---- Generate Button ---- */
    .btn-generate {
      width: 100%;
      padding: 1rem;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: var(--radius-btn);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background var(--transition), transform 0.15s;
    }
    .btn-generate:hover  { background: #B06040; }
    .btn-generate:active { transform: scale(0.97); }

    /* ===========================================================
       DECK SECTION
       =========================================================== */
    .deck-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
    }
    .deck-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .deck-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--ink);
    }
    .deck-hint {
      font-size: 0.9rem;
      color: var(--ink-mid);
      margin-top: 0.25rem;
    }

    /* Back button */
    .btn-back {
      background: var(--white);
      border: 2px solid #EDE9E4;
      border-radius: var(--radius-btn);
      padding: 0.55rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      transition: border-color var(--transition), background var(--transition);
      white-space: nowrap;
    }
    .btn-back:hover { border-color: #B06040; background: var(--peach); }

    /* ---- Progress ---- */
    .progress-wrap {
      background: #EDE9E4;
      border-radius: 50px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #B06040, #E88A5A);
      border-radius: 50px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 0.82rem;
      color: var(--ink-mid);
      margin-bottom: 2rem;
    }

    /* ---- Cards Grid ---- */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    /* ============================================================
       FLASHCARD – 3-D Flip Effect
       ============================================================ */

    /* Outer wrapper — sets the 3-D perspective */
    .flashcard {
      perspective: 1000px;
      cursor: pointer;
      height: 200px;
      animation: fadeUp 0.4s ease both;
    }

    /* Inner wrapper — this is what actually rotates */
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius-card);
    }

    /* When the card has .flipped class, rotate 180° */
    .flashcard.flipped .card-inner { transform: rotateY(180deg); }

    /* Both faces share these base styles */
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.4rem;
      text-align: center;
      box-shadow: 0 6px 24px var(--shadow);
    }

    /* FRONT face */
    .card-front { background: var(--white); }
    .card-front .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      margin-bottom: 0.75rem;
    }
    .card-front .card-question {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      line-height: 1.4;
      color: var(--ink);
    }

    /* BACK face — rotated 180° so it starts hidden */
    .card-back { transform: rotateY(180deg); }
    .card-back .card-answer {
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--ink);
    }

    /* Pastel colour variants */
    .color-peach   .card-back { background: var(--peach); }
    .color-mint    .card-back { background: var(--mint); }
    .color-sky     .card-back { background: var(--sky); }
    .color-lemon   .card-back { background: var(--lemon); }
    .color-lavender.card-back { background: var(--lavender); }
    .color-rose    .card-back { background: var(--rose); }

    /* Card number badge */
    .card-number {
      position: absolute;
      top: 0.8rem;
      right: 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #C2BAB3;
    }

    /* ---- Completion Message ---- */
    .completion {
      text-align: center;
      margin-top: 3rem;
      animation: fadeUp 0.5s ease both;
    }
    .completion-icon { font-size: 3rem; }
    .completion h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      margin: 0.5rem 0 0.3rem;
    }
    .completion p { color: var(--ink-mid); margin-bottom: 1.25rem; }

    .btn-reset {
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: var(--radius-btn);
      padding: 0.75rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    .btn-reset:hover { background: #B06040; }

    /* ---- Loading Overlay ---- */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 249, 245, 0.88);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 999;
      font-size: 1rem;
      color: var(--ink-mid);
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #EDE9E4;
      border-top-color: #B06040;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ---- Animations ---- */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .setup-card { padding: 1.5rem 1.25rem; }
      .deck-header { flex-direction: column; }
      .cards-grid  { grid-template-columns: 1fr; }
      .flashcard   { height: 185px; }
    }
  </style>
</head>
<body>

  <!-- ========== HERO / SETUP SECTION ========== -->
  <section class="hero" id="setup-section">
    <div class="hero-blob blob-1"></div>
    <div class="hero-blob blob-2"></div>

    <header class="site-header">
      <span class="logo">✦ FlashLearn</span>
    </header>

    <div class="hero-content">
      <h1 class="hero-title">
        Learn anything,<br />
        <em>one card at a time.</em>
      </h1>
      <p class="hero-sub">Type a topic, choose how many cards, and let AI build your deck instantly.</p>

      <!-- Setup Form -->
      <div class="setup-card">
        <div class="form-group">
          <label for="topic-input">Topic</label>
          <input
            type="text"
            id="topic-input"
            placeholder="e.g. Photosynthesis, World War II, JavaScript…"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="count-input">Number of cards <span class="count-badge" id="count-display">5</span></label>
          <input type="range" id="count-input" min="3" max="12" value="5" />
          <div class="range-labels"><span>3</span><span>12</span></div>
        </div>

        <button class="btn-generate" id="generate-btn">
          Generate Flashcards ✦
        </button>
      </div>
    </div>
  </section>

  <!-- ========== FLASHCARD DECK SECTION ========== -->
  <section class="deck-section hidden" id="deck-section">
    <div class="deck-header">
      <div>
        <h2 class="deck-title" id="deck-title">Topic</h2>
        <p class="deck-hint">Click any card to flip it</p>
      </div>
      <button class="btn-back" id="back-btn">← New Deck</button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p class="progress-text" id="progress-text">0 / 0 flipped</p>

    <!-- Cards Grid -->
    <div class="cards-grid" id="cards-grid"></div>

    <!-- Completion message -->
    <div class="completion hidden" id="completion">
      <span class="completion-icon">🎉</span>
      <h3>You flipped them all!</h3>
      <p>Great job reviewing your deck.</p>
      <button class="btn-reset" id="reset-btn">Flip All Back</button>
    </div>
  </section>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="spinner"></div>
    <p>Building your deck…</p>
  </div>

  <script>
    /* ============================================================
       FlashLearn – JavaScript
       Beginner-friendly with lots of comments!
       ============================================================ */

    // ---- 1. GRAB ELEMENTS FROM THE PAGE ----------------------
    const topicInput     = document.getElementById('topic-input');
    const countInput     = document.getElementById('count-input');
    const countDisplay   = document.getElementById('count-display');
    const generateBtn    = document.getElementById('generate-btn');
    const setupSection   = document.getElementById('setup-section');
    const deckSection    = document.getElementById('deck-section');
    const deckTitle      = document.getElementById('deck-title');
    const cardsGrid      = document.getElementById('cards-grid');
    const backBtn        = document.getElementById('back-btn');
    const resetBtn       = document.getElementById('reset-btn');
    const progressBar    = document.getElementById('progress-bar');
    const progressText   = document.getElementById('progress-text');
    const completion     = document.getElementById('completion');
    const loadingOverlay = document.getElementById('loading-overlay');

    // ---- 2. COLOUR PALETTE -----------------------------------
    const COLORS = ['color-peach', 'color-mint', 'color-sky', 'color-lemon', 'color-lavender', 'color-rose'];

    // ---- 3. RANGE SLIDER: show live number -------------------
    countInput.addEventListener('input', () => {
      countDisplay.textContent = countInput.value;
    });

    // ---- 4. GENERATE BUTTON ----------------------------------
    generateBtn.addEventListener('click', async () => {
      const topic = topicInput.value.trim();
      const count = parseInt(countInput.value, 10);

      // Validation
      if (!topic) {
        topicInput.focus();
        topicInput.style.borderColor = '#E05C3A';
        setTimeout(() => { topicInput.style.borderColor = ''; }, 1500);
        return;
      }

      showLoading(true);

      try {
        const flashcards = await generateFlashcards(topic, count);
        setupSection.classList.add('hidden');
        deckSection.classList.remove('hidden');
        deckTitle.textContent = topic;
        renderCards(flashcards);
      } catch (error) {
        console.error('Error generating flashcards:', error);
        alert(`Error: ${error.message}\n\n(Press F12 and check the Console for details)`);
      } finally {
        showLoading(false);
      }
    });

    // ---- 5. FETCH FLASHCARDS FROM GROQ API (Llama 3.1) -------
    async function generateFlashcards(topic, count) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer 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',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'llama-3.1-8b-instant',
          messages: [
            {
              role: 'user',
              content: `Create ${count} flashcards about ${topic}.\n\nReturn ONLY valid JSON in this format:\n\n[\n  {\n    "question": "Question here",\n    "answer": "Answer here"\n  }\n]`
            }
          ],
          temperature: 0.7
        })
      });

      if (!response.ok) throw new Error(`API error: ${response.status}`);

      const data = await response.json();

      const rawText = data.choices[0].message.content;
      
      // Extract just the JSON array to handle any extra conversational text Llama might add
      const match = rawText.match(/\[[\s\S]*\]/);
      if (!match) {
        throw new Error("AI did not return a valid JSON array.");
      }
      
      // Convert AI text into JSON
      const flashcards = JSON.parse(match[0]);

      return flashcards;
    }

    // ---- 6. RENDER CARDS -------------------------------------
    function renderCards(flashcards) {
      cardsGrid.innerHTML = '';
      completion.classList.add('hidden');
      updateProgress(0, flashcards.length);

      flashcards.forEach((cardData, index) => {
        const colorClass = COLORS[index % COLORS.length];

        const card = document.createElement('div');
        card.className = `flashcard ${colorClass}`;
        card.style.animationDelay = `${index * 0.07}s`;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-front">
              <span class="card-number">${index + 1} / ${flashcards.length}</span>
              <span class="card-label">Question</span>
              <p class="card-question">${escapeHTML(cardData.question)}</p>
            </div>
            <div class="card-face card-back">
              <p class="card-answer">${escapeHTML(cardData.answer)}</p>
            </div>
          </div>
        `;

        card.addEventListener('click', () => flipCard(card, flashcards.length));
        cardsGrid.appendChild(card);
      });
    }

    // ---- 7. FLIP A CARD --------------------------------------
    function flipCard(card, totalCards) {
      card.classList.toggle('flipped');
      const flippedCount = cardsGrid.querySelectorAll('.flashcard.flipped').length;
      updateProgress(flippedCount, totalCards);

      if (flippedCount === totalCards) {
        setTimeout(() => completion.classList.remove('hidden'), 500);
      } else {
        completion.classList.add('hidden');
      }
    }

    // ---- 8. PROGRESS BAR -------------------------------------
    function updateProgress(flipped, total) {
      const percent = total === 0 ? 0 : Math.round((flipped / total) * 100);
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${flipped} / ${total} flipped`;
    }

    // ---- 9. BACK BUTTON --------------------------------------
    backBtn.addEventListener('click', () => {
      deckSection.classList.add('hidden');
      setupSection.classList.remove('hidden');
      topicInput.value = '';
    });

    // ---- 10. RESET BUTTON ------------------------------------
    resetBtn.addEventListener('click', () => {
      cardsGrid.querySelectorAll('.flashcard').forEach(card => card.classList.remove('flipped'));
      updateProgress(0, cardsGrid.querySelectorAll('.flashcard').length);
      completion.classList.add('hidden');
    });

    // ---- 11. HELPERS -----------------------------------------
    function showLoading(isVisible) {
      isVisible
        ? loadingOverlay.classList.remove('hidden')
        : loadingOverlay.classList.add('hidden');
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
